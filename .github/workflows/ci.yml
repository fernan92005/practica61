name: Practica 6

on: [push, pull_request]

permissions:
  contents: write
  checks: write

jobs: 
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Compilar set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Dar permisos a Maven
        run: chmod +x ./mvnw
      
      - name: Build with Maven
        run: ./mvnw compile --no-transfer-progress
  
  test:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Compilar set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      
      - name: Dar permisos a Maven
        run: chmod +x ./mvnw

      - name: Ejecutar tests
        run: ./mvnw verify --no-transfer-progress

# 1. Informe de resultados con dorny (lee los XML de Surefire y Failsafe)
      - name: Publish Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Resultados de Pruebas
          path: '**/target/surefire-reports/*.xml,**/target/failsafe-reports/*.xml'
          reporter: java-junit

      # 2. Artefactos prometidos en el README
      - name: Uploads XML reports as a downloadable artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports-xml
          path: |
            **/target/surefire-reports/*.xml
            **/target/failsafe-reports/*.xml
          retention-days: 7

      # 3. Generar Badge de Jacoco (asegúrate de que el plugin jacoco-maven-plugin está en tu pom.xml)
      - name: Generate JaCoCo Badge
        id: jacoco
        uses: cicirello/jacoco-badge-generator@v2
        with:
          generate-branches-badge: true
          jacoco-csv-file: target/site/jacoco/jacoco.csv

      # 4. Hacer commit y push del badge autogenerado de Jacoco
      - name: Commit y Push del Badge de Cobertura
        if: github.event_name == 'push'
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/badges/
          git commit -m "Actualizar badge de cobertura Jacoco" || echo "No hay cambios en la cobertura"
          git push
